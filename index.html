<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保護者連絡帳テンプレ集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #ccc9be;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #9e9c96;
    --accent: #2c5f8a;
    --accent-bg: #e8f1f8;
    --accent-border: #9cbcd8;
    --success: #2d7a4f;
    --success-bg: #e6f4ed;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 700; color: var(--text); }
  header p { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .cat-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-btn {
    padding: 7px 16px; border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--surface);
    font-size: 13px; font-family: inherit;
    color: var(--text2); cursor: pointer;
    transition: all .15s; font-weight: 500;
  }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .tmpl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }
  .tmpl-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    cursor: pointer; transition: all .15s;
  }
  .tmpl-card:hover { border-color: var(--border2); background: var(--surface); }
  .tmpl-card.selected { border-color: var(--accent-border); background: var(--accent-bg); }
  .tmpl-icon { font-size: 20px; margin-bottom: 8px; }
  .tmpl-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .tmpl-card.selected .tmpl-title { color: var(--accent); }
  .tmpl-desc { font-size: 11px; color: var(--text3); line-height: 1.4; }
  .placeholder { color: var(--text3); font-size: 13px; text-align: center; padding: 20px; width: 100%; }
  .name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .name-row label { font-size: 13px; color: var(--text2); white-space: nowrap; font-weight: 500; }
  .name-row input, .name-row select {
    height: 40px; padding: 0 12px;
    font-size: 14px; font-family: inherit;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .name-row input { flex: 1; min-width: 160px; }
  .name-row input:focus, .name-row select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44,95,138,.12);
  }
  .preview-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    min-height: 130px; margin-bottom: 14px;
  }
  .p-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .preview-text { font-size: 14px; color: var(--text); line-height: 1.9; white-space: pre-wrap; word-break: break-all; }
  .preview-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 20px 0; }
  .action-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 22px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-family: inherit; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .copy-btn:hover { background: #245278; }
  .copy-btn:active { transform: scale(.98); }
  .copy-btn.done { background: var(--success); }
  .reset-btn {
    background: none; border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 8px 16px;
    font-size: 13px; font-family: inherit; color: var(--text2);
    cursor: pointer; transition: all .15s;
  }
  .reset-btn:hover { background: var(--surface2); color: var(--text); }
  .copy-notice { font-size: 13px; color: var(--success); font-weight: 500; opacity: 0; transition: opacity .2s; }
  .copy-notice.show { opacity: 1; }
  @media (max-width: 520px) {
    header { padding: 14px 16px; }
    header h1 { font-size: 15px; }
    .container { padding: 16px 12px 60px; }
    .tmpl-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .name-row { flex-direction: column; align-items: stretch; }
    .name-row input, .name-row select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="icon">📋</div>
  <div>
    <h1>保護者連絡帳テンプレ集</h1>
    <p>先生 → 保護者｜状況を選択 → 生徒名を入力 → コピーの3ステップで完了</p>
  </div>
</header>

<div class="container">

  <div class="step">
    <div class="step-header"><div class="step-num">1</div><div class="step-title">カテゴリを選ぶ</div></div>
    <div class="cat-row" id="cats"></div>
  </div>

  <div class="step">
    <div class="step-header"><div class="step-num">2</div><div class="step-title">テンプレートを選ぶ</div></div>
    <div class="tmpl-grid" id="tmplGrid">
      <div class="placeholder">👆 まずカテゴリを選んでください</div>
    </div>
  </div>

  <div class="step">
    <div class="step-header"><div class="step-num">3</div><div class="step-title">生徒名を入力する</div></div>
    <div class="name-row">
      <label>生徒名</label>
      <input type="text" id="nameInput" placeholder="例：田中 太郎" oninput="renderPreview()">
      <label>敬称</label>
      <select id="honorific" onchange="renderPreview()">
        <option value="さん">さん</option>
        <option value="くん">くん</option>
        <option value="ちゃん">ちゃん</option>
        <option value="">（なし）</option>
      </select>
    </div>
  </div>

  <div class="step">
    <div class="step-header"><div class="step-num">4</div><div class="step-title">確認してコピー</div></div>
    <div class="preview-box">
      <div class="p-label">プレビュー</div>
      <div id="previewText" class="preview-empty">テンプレートを選択すると文章が表示されます</div>
    </div>
    <div class="action-row">
      <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 コピーする</button>
      <button class="reset-btn" onclick="resetAll()">↺ リセット</button>
      <span class="copy-notice" id="copyNotice">✓ コピーしました！</span>
    </div>
  </div>

</div>

<script>
const data = {
  "欠席・体調": [
    {title:"欠席のお知らせ（発熱）",icon:"🌡️",desc:"発熱による欠席を保護者へ連絡",tmpl:"いつもお世話になっております。本日、{name}が発熱のため欠席しております。お体の具合はいかがでしょうか。ご回復を心よりお祈り申し上げます。登校の際はどうぞ無理をなさらず、体調が整ってからお越しください。"},
    {title:"欠席のお知らせ（体調不良）",icon:"🤒",desc:"体調不良による欠席連絡",tmpl:"いつもお世話になっております。本日、{name}が体調不良のためお休みとなっております。ご様子はいかがでしょうか。回復されましたら、また元気に登校してくれることを楽しみにしております。"},
    {title:"早退後のご連絡",icon:"🚶",desc:"早退後に様子を知らせる",tmpl:"本日は{name}の早退にご対応いただきありがとうございました。帰宅後のご様子はいかがでしょうか。何かお気づきのことがございましたら、お気軽にご連絡ください。"},
    {title:"体調不良が続く場合",icon:"🏥",desc:"学校での様子を共有する",tmpl:"いつもお世話になっております。{name}ですが、最近学校でも少し体調が優れない様子が見受けられます。ご家庭でもお変わりはないでしょうか。何かご心配なことがあれば、遠慮なくご相談ください。"},
  ],
  "忘れ物": [
    {title:"教科書・ノートの忘れ物",icon:"📚",desc:"学用品の忘れ物を伝える",tmpl:"いつもお世話になっております。本日、{name}が教科書を忘れておりました。明日の授業で必要となりますので、ご確認のうえお持たせいただけますと幸いです。お手数をおかけして申し訳ありません。"},
    {title:"体操着・給食着の忘れ物",icon:"👕",desc:"着替え関連の忘れ物を伝える",tmpl:"いつもお世話になっております。本日、{name}が体操着を忘れておりました。明日は体育の授業がございますので、お持たせいただけますようお願いいたします。"},
    {title:"提出物の未提出",icon:"📝",desc:"宿題・プリントの未提出",tmpl:"いつもお世話になっております。{name}の〇〇（提出物名）がまだ届いておりません。もしご不明な点などがございましたらお気軽にご連絡ください。明日ご持参いただけますと助かります。"},
    {title:"忘れ物が続いている場合",icon:"🎒",desc:"繰り返しの忘れ物について",tmpl:"いつもお世話になっております。最近、{name}の忘れ物が少し続いておりますので、ご家庭でも連絡帳の確認をお声がけいただけますと大変助かります。ご協力のほどよろしくお願いいたします。"},
  ],
  "学習・生活": [
    {title:"学習面の様子を共有",icon:"📖",desc:"授業や学習の様子を伝える",tmpl:"いつもお世話になっております。{name}ですが、最近〇〇（教科）の授業でつまずいている様子が見られます。放課後に個別でフォローするよう努めておりますが、ご家庭でも少しお声がけいただけると心強いです。"},
    {title:"授業態度・集中力について",icon:"👀",desc:"授業中の様子を伝える",tmpl:"いつもお世話になっております。{name}ですが、最近授業中に集中を保つことが難しい様子が見受けられます。学校でも引き続きサポートしてまいりますが、ご家庭での睡眠や食事面など、何かお気づきのことがあればお聞かせください。"},
    {title:"生活習慣のお願い",icon:"☀️",desc:"生活リズムについて",tmpl:"いつもお世話になっております。朝の登校時間に{name}が眠そうにしている日が続いております。就寝時間や朝食など、生活リズムについてご家庭でもご確認いただけますと幸いです。"},
  ],
  "友人関係": [
    {title:"友人トラブルの報告",icon:"👫",desc:"トラブルがあった旨を伝える",tmpl:"いつもお世話になっております。本日、{name}と〇〇さんの間で少しトラブルがございました。双方から話を聞き、その場で解決に向けて指導いたしましたが、ご家庭でも様子をお聞きいただけますと助かります。何かご不明な点があればお気軽にご連絡ください。"},
    {title:"いじめ・からかいの報告",icon:"⚠️",desc:"気になる行為を速やかに報告",tmpl:"いつもお世話になっております。{name}に関して気になる点がございましたので、ご連絡いたします。詳しくは直接お話しさせていただきたく存じますので、お時間をいただけますでしょうか。お子さまのことを第一に考え、学校でも丁寧に対応してまいります。"},
    {title:"友人関係が良好な報告",icon:"🌸",desc:"ポジティブな様子を伝える",tmpl:"いつもお世話になっております。{name}は最近、お友達との関係がとても良好で、休み時間も楽しそうに過ごしている様子です。学校での成長をご報告できて嬉しく思います。今後も温かく見守ってまいります。"},
  ],
  "面談・相談": [
    {title:"面談のご案内",icon:"📅",desc:"個人面談の日程を伝える",tmpl:"いつもお世話になっております。来る〇月〇日（〇）〇時より、{name}の個人面談を予定しております。学校での様子や今後の学習についてお話しできればと思います。ご都合がよろしければ、ぜひご参加いただけますと幸いです。"},
    {title:"緊急の相談依頼",icon:"💬",desc:"急ぎで連絡を取りたい場合",tmpl:"いつもお世話になっております。{name}のことで早めにご相談したいことがございます。お手数ですが、本日中にご連絡いただけますでしょうか。どうぞよろしくお願いいたします。"},
    {title:"相談内容への返答",icon:"💭",desc:"保護者からの相談への回答",tmpl:"先日はご相談いただきありがとうございました。{name}の件ですが、学校でも改めて様子を確認いたしました。引き続き、本人が安心して学校生活を送れるようサポートしてまいります。また何かございましたらいつでもご連絡ください。"},
  ],
  "行事・お知らせ": [
    {title:"行事の事前案内",icon:"📣",desc:"遠足・運動会などの案内",tmpl:"いつもお世話になっております。来る〇月〇日（〇）に〇〇（行事名）を予定しております。{name}も楽しみにしている様子です。持ち物等の詳細については別途配布のプリントをご確認ください。"},
    {title:"行事後のご報告",icon:"⭐",desc:"行事が無事終わった旨を伝える",tmpl:"先日の〇〇（行事名）では大変お世話になりました。{name}も一生懸命取り組んでおり、充実した一日になったかと思います。ご家庭でもぜひ話題にしていただけると嬉しいです。"},
    {title:"持ち物・提出物のお願い",icon:"✅",desc:"明日の持ち物などを連絡",tmpl:"いつもお世話になっております。明日〇月〇日（〇）は〇〇がございます。{name}に本日お伝えしておりますが、ご家庭でも〇〇（持ち物）のご確認をいただけますと幸いです。"},
  ],
  "その他": [
    {title:"服薬対応のご確認",icon:"💊",desc:"学校での服薬管理について",tmpl:"いつもお世話になっております。{name}のお薬についてですが、学校でお預かりし、〇時頃に服用させていただいております。ご不明な点などございましたらいつでもお気軽にご連絡ください。"},
    {title:"アレルギー対応の確認",icon:"🚨",desc:"アレルギー情報の確認・共有",tmpl:"いつもお世話になっております。{name}のアレルギーについて、給食や行事での対応を適切に行うため、改めて最新の状況をお聞かせいただけますでしょうか。ご負担をおかけして恐れ入りますが、よろしくお願いいたします。"},
    {title:"お迎え・引き渡しの確認",icon:"🔄",desc:"下校・引き渡し変更の確認",tmpl:"いつもお世話になっております。本日の{name}のお迎えについてご確認いただきたく存じます。通常と異なるご対応がある場合は、あらかじめご連絡いただけますと助かります。どうぞよろしくお願いいたします。"},
    {title:"ポジティブな成長の共有",icon:"👍",desc:"良い行動・成長を伝える",tmpl:"いつもお世話になっております。{name}ですが、最近授業や学校生活の中でとても積極的に取り組む姿が見られます。ご家庭でのご支援のおかげと感謝しております。今後も一緒に見守ってまいります。"},
  ],
};

let selectedCat = null;
let selectedTmpl = null;

const catsEl = document.getElementById('cats');
const gridEl = document.getElementById('tmplGrid');
const previewEl = document.getElementById('previewText');

Object.keys(data).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.textContent = cat;
  btn.onclick = () => selectCat(cat, btn);
  catsEl.appendChild(btn);
});

function selectCat(cat, btn) {
  selectedCat = cat; selectedTmpl = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(); renderPreview();
}

function renderGrid() {
  gridEl.innerHTML = '';
  (data[selectedCat] || []).forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'tmpl-card';
    card.innerHTML = `<div class="tmpl-icon">${t.icon}</div><div class="tmpl-title">${t.title}</div><div class="tmpl-desc">${t.desc}</div>`;
    card.onclick = () => {
      selectedTmpl = t;
      document.querySelectorAll('.tmpl-card').forEach((c, j) => c.classList.toggle('selected', j === i));
      renderPreview();
    };
    gridEl.appendChild(card);
  });
}

function renderPreview() {
  const name = document.getElementById('nameInput').value.trim();
  const honorific = document.getElementById('honorific').value;
  if (!selectedTmpl) {
    previewEl.className = 'preview-empty';
    previewEl.textContent = 'テンプレートを選択すると文章が表示されます';
    return;
  }
  const displayName = name ? (name + honorific) : '【生徒名】';
  previewEl.className = 'preview-text';
  previewEl.textContent = selectedTmpl.tmpl.replace(/\{name\}/g, displayName);
}

function copyText() {
  if (!selectedTmpl || previewEl.classList.contains('preview-empty')) return;
  navigator.clipboard.writeText(previewEl.textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    const notice = document.getElementById('copyNotice');
    btn.classList.add('done');
    btn.textContent = '✓ コピー済み';
    notice.classList.add('show');
    setTimeout(() => {
      btn.classList.remove('done');
      btn.textContent = '📋 コピーする';
      notice.classList.remove('show');
    }, 2500);
  });
}

function resetAll() {
  selectedCat = null; selectedTmpl = null;
  document.getElementById('nameInput').value = '';
  document.getElementById('honorific').value = 'さん';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  gridEl.innerHTML = '<div class="placeholder">👆 まずカテゴリを選んでください</div>';
  previewEl.className = 'preview-empty';
  previewEl.textContent = 'テンプレートを選択すると文章が表示されます';
}
</script>
</body>
